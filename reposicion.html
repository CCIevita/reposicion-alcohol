<!DOCTYPE html>

<html lang="es"> <head> <meta charset="UTF-8"> <title>Reposición de Alcohol</title> <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #eef2f5;
        text-align: center;
        padding: 30px;
    }

    .card {
        background: white;
        max-width: 420px;
        margin: auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    .logo {
        width: 120px;
        margin-bottom: 15px;
    }

    .ubicacion {
        font-size: 16px;
        margin-bottom: 20px;
        color: #333;
    }

    button {
        background-color: #1e3a5f;
        color: white;
        font-size: 18px;
        padding: 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
    }

    .mensaje {
        display: none;
        color: green;
        font-weight: bold;
        margin-top: 20px;
    }
</style>

</head>
    
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    
<body>

<div class="card">

<!-- Logo -->
<img src="logo.png" class="logo">

<h2>Reposición de Alcohol</h2>
<p>H.I.G.A. Evita - Lanús</p>

    <!-- Ubicación dinámica -->
    <p class="ubicacion">
        Ubicación: <strong id="ubicacionTexto"></strong>
    </p>

    <!-- Botón -->
    <div id="formulario">
        <button onclick="enviarSolicitud()">
            Solicitar reposición
        </button>
    </div>

    <!-- Confirmación -->
    <div class="mensaje" id="mensajeConfirmacion">
        ✅ Solicitud enviada correctamente
    </div>

</div>

<script>
    // Leer ID desde QR
    const params = new URLSearchParams(window.location.search);
    const ubicacion = params.get("id") || "No especificada";

    document.getElementById("ubicacionTexto").innerText = ubicacion;

    function enviarSolicitud() {

        fetch("https://script.google.com/macros/s/AKfycbzpKTBSdnRYrXdkPv-ukfaDL32EYAA9Isqgxh7S1mzcCfb8-uNiNG7do_-GfhiWWw_F/exec", {
            method: "POST",
            body: JSON.stringify({
                tipo: "Alcohol",
                ubicacion: ubicacion
            })
        })
        .then(() => {
            document.getElementById("formulario").style.display = "none";
            document.getElementById("mensajeConfirmacion").style.display = "block";
        })
        .catch(() => {
            alert("Error al enviar la solicitud");
        });

    }
</script>

</body>
</html>
