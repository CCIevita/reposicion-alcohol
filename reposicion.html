<!DOCTYPE html>

<html lang="es"> <head> <meta charset="UTF-8"> <title>Reposición de Alcohol</title> <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #eef2f5;
        text-align: center;
        padding: 30px;
    }

    .card {
        background: white;
        max-width: 420px;
        margin: auto;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    .logo {
        width: 120px;
        margin-bottom: 15px;
    }

    .habitacion {
        font-size: 16px;
        margin-bottom: 20px;
        color: #333;
    }

    button {
        background-color: #1e3a5f;
        color: white;
        font-size: 18px;
        padding: 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
    }

    .mensaje {
        display: none;
        color: green;
        font-weight: bold;
        margin-top: 20px;
    }
</style>

</head>

<body>

<div class="card">

<!-- Logo -->
<img src="logo.png" class="logo">

<h2>Reposición de Alcohol</h2>
<p>H.I.G.A. Evita - Lanús</p>

 <p class="info">
    Dispenser: <strong id="dispenserID"></strong>
    </p>

<form id="formulario" action="https://formsubmit.co/comite.infecciones.evitalanus@gmail.com" method="POST">

  
    <!-- Campo oculto con el ID del dispenser -->
    <input type="hidden" name="Dispenser" id="inputDispenser">

    <!-- Asunto del correo -->
    <input type="hidden" name="_subject"
           value="Solicitud de reposición de alcohol">

    <!-- Evita captcha -->
    <input type="hidden" name="_captcha" value="false">

    <!-- Mensaje -->
    <input type="hidden" name="Mensaje"
           value="Se solicita reposición de alcohol.">

    <button type="submit">
        Solicitar reposición
    </button>
</form>

<!-- Mensaje de confirmación -->
<div class="mensaje" id="mensajeConfirmacion">
    ✅ Solicitud enviada correctamente
</div>

<script>
    // Obtener ID del dispenser desde la URL
    const params = new URLSearchParams(window.location.search);
    const dispenser = params.get("id") || "No identificado";

    // Mostrarlo en pantalla
    document.getElementById("dispenserID").innerText = dispenser;

    // Enviarlo en el formulario
    document.getElementById("inputDispenser").value = dispenser;
</script>

</body>
</html>
</body> </html>
